    <script>
        /* ==========================================================
           슬라이더 C 스타일 헬퍼
           - 트랙 fill 너비 업데이트
           - float 배지 텍스트 + 가로 위치 업데이트
           - 라벨 active 토글
        ========================================================== */
        function updateSlider(slider, fillEl, valueEl, labelEls, labelText) {
            const min = parseFloat(slider.min);
            const max = parseFloat(slider.max);
            const val = parseFloat(slider.value);
            const pct = ((val - min) / (max - min)) * 100;

            // 트랙 fill
            if (fillEl) fillEl.style.width = pct + '%';

            // float 배지 위치 — 썸 중심에 맞춤 (양쪽 9px 썸 반경 보정)
            if (valueEl) {
                const thumbRadius = 9;
                const trackW = slider.offsetWidth || slider.parentElement.offsetWidth;
                const pos = thumbRadius + (pct / 100) * (trackW - thumbRadius * 2);
                valueEl.style.left = pos + 'px';
                valueEl.textContent = labelText;
            }

            // 라벨 active
            labelEls.forEach(lbl => {
                lbl.classList.toggle('active', lbl.getAttribute('data-value') === String(slider.value));
            });
        }

        /* ── 보고서 분량 슬라이더 ── */
        const detailLevelConfig = {
            '-45': '최소',
            '-30': '간결',
            '-15': '약간 간결',
            '0':   '표준',
            '15':  '약간 상세',
            '30':  '상세',
            '45':  '최대'
        };

        const detailSlider   = document.getElementById('detailLevelSlider');
        const detailFill     = document.getElementById('detailLevelTrackFill');
        const detailValueEl  = document.getElementById('detailLevelValue');
        const detailLabels   = document.querySelectorAll('.detail-labels span');

        function syncDetailSlider(val) {
            updateSlider(detailSlider, detailFill, detailValueEl,
                detailLabels, detailLevelConfig[String(val)] || val);
        }

        if (detailSlider) {
            const saved = localStorage.getItem('detailLevel') || '0';
            detailSlider.value = saved;
            // 레이아웃 완성 후 위치 계산
            requestAnimationFrame(() => syncDetailSlider(saved));

            detailSlider.addEventListener('input', e => {
                localStorage.setItem('detailLevel', e.target.value);
                syncDetailSlider(e.target.value);
            });
        }

        /* ── 글씨 크기 슬라이더 ── */
        const fontSlider   = document.getElementById('fontSizeSlider');
        const fontFill     = document.getElementById('fontSizeTrackFill');
        const fontValueEl  = document.getElementById('fontSizeValue');
        const fontLabels   = document.querySelectorAll('.font-labels span');

        function syncFontSlider(val) {
            document.documentElement.style.fontSize = val + 'px';
            updateSlider(fontSlider, fontFill, fontValueEl,
                fontLabels, val + 'px');
        }

        if (fontSlider) {
            const saved = localStorage.getItem('fontSize') || '16';
            fontSlider.value = saved;
            requestAnimationFrame(() => syncFontSlider(saved));

            fontSlider.addEventListener('input', e => {
                localStorage.setItem('fontSize', e.target.value);
                syncFontSlider(e.target.value);
            });
        }

        /* ── 저장 및 복귀 ── */
        function saveAndReturn() {
            const success = saveSettingsToStorage();
            const models = {
                groq: document.getElementById('useGroq').checked,
                gpt:  document.getElementById('useGPT').checked
            };
            localStorage.setItem('enabledModels', JSON.stringify(models));

            if (success) {
                showToast('✓ 설정이 저장되었습니다.', 1000);
                setTimeout(() => { window.location.href = 'report.html'; }, 1000);
            }
        }

        /* ── API 가이드 토글 ── */
        function toggleApiGuide() {
            const content = document.getElementById('apiGuideContent');
            const text    = document.getElementById('apiGuideToggleText');
            const icon    = document.getElementById('apiGuideToggleIcon');
            const button  = document.querySelector('.api-guide-toggle-btn');
            const isHidden = content.classList.toggle('is-hidden');
            if (button) button.classList.toggle('active', !isHidden);
            text.textContent = isHidden ? 'API 발급 영상 가이드 보기' : 'API 발급 영상 가이드 닫기';
            icon.textContent = isHidden ? '▼' : '▲';
        }

        /* ── DOMContentLoaded ── */
        window.addEventListener('DOMContentLoaded', () => {
            loadSettings();

            const useGroq = document.getElementById('useGroq');
            const useGPT  = document.getElementById('useGPT');
            const savedModels = JSON.parse(localStorage.getItem('enabledModels') || '{"groq":true,"gpt":true}');
            useGroq.checked = savedModels.groq !== false;
            useGPT.checked  = savedModels.gpt  !== false;

            // 슬라이더 배지 위치 재계산 (폰트 로드 후)
            requestAnimationFrame(() => {
                syncDetailSlider(detailSlider ? detailSlider.value : '0');
                syncFontSlider(fontSlider ? fontSlider.value : '16');
            });

            function validateModelSelection(changed, other) {
                if (!changed.checked && !other.checked) {
                    showToast('⚠️ 최소 1개 이상의 모델을 선택해야 합니다.', 2000);
                    changed.checked = true;
                    return false;
                }
                return true;
            }

            useGroq.addEventListener('change', function () {
                if (validateModelSelection(this, useGPT)) {
                    localStorage.setItem('enabledModels', JSON.stringify({ groq: useGroq.checked, gpt: useGPT.checked }));
                    showToast('✓ 모델 설정이 저장되었습니다.', 1500);
                }
            });

            useGPT.addEventListener('change', function () {
                if (validateModelSelection(this, useGroq)) {
                    localStorage.setItem('enabledModels', JSON.stringify({ groq: useGroq.checked, gpt: useGPT.checked }));
                    showToast('✓ 모델 설정이 저장되었습니다.', 1500);
                }
            });
        });
    </script>
</body>
</html>
